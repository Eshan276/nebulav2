name: Release

on:
  release:
    types: [created]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: nebula-linux-x86_64
            flags: RUSTFLAGS='-C target-feature=+crt-static'
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: nebula-macos-aarch64
            flags: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: nebula-macos-x86_64
            flags: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: cli
        run: ${{ matrix.flags }} cargo build --release --target ${{ matrix.target }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/target/${{ matrix.target }}/release/nebula
          asset_name: ${{ matrix.asset_name }}
